[changelog]
header = """
## Flashing

### First-time / Factory Flash

Open the **[browser flasher](https://pfeerick.github.io/LilyGo-EPD-4-7-OWM-Weather-Display/)** in a Chromium-based browser with Web Serial support (Chrome, Edge, Opera, Brave, etc.),
select a version, choose **Factory Flash**, connect your device via USB, and click **Install**.
This erases the device and writes the bootloader, partition table, and application.

No file download required. Alternatively, download `firmware-factory-*.bin` and flash via
[web.esphome.io](https://web.esphome.io/) or `esptool.py write_flash 0x0`.

### Update Flash

Open the **[browser flasher](https://pfeerick.github.io/LilyGo-EPD-4-7-OWM-Weather-Display/)**,
select a version, choose **Update Flash**, and click **Install**.
This writes only the application binary and preserves your WiFi credentials and settings.

Alternatively, use the on-device web portal (served over WiFi) to upload `firmware-*.bin`,
or flash manually with `esptool.py write_flash 0x10000`.

## Changes

"""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}

{% for commit in commits %}
- {{ commit.message | upper_first }}
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
  { message = "^feat",             group = "Features"      },
  { message = "^fix",              group = "Bug Fixes"     },
  { message = "^perf",             group = "Performance"   },
  { message = "^refactor",         group = "Refactoring"   },
  { message = "^docs",             group = "Documentation" },
  { message = "^style",            group = "Styling"       },
  { message = "^test",             group = "Testing"       },
  { message = "^chore|^ci|^build", group = "Miscellaneous"  },
]
filter_commits = true
