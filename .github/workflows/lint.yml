name: Lint

on:
  pull_request:
    paths:
      - 'src/**'
      - 'include/**'
      - 'simulator/**'
      - 'web/**'
      - 'index.js'
  workflow_call:

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install clang-format-18
        run: sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          clang-format-18 --dry-run --Werror \
            src/*.cpp \
            include/*.h \
            include/translations/*.h \
            simulator/*.cpp \
            simulator/*.h \
            simulator/epdiy_pc/*.c \
            simulator/epdiy_pc/*.h \
            simulator/esp_stubs/*.h \
            simulator/esp_stubs/xtensa/*.h

  biome:
    name: biome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check
