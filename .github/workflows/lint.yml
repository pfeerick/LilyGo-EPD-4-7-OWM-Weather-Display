name: Lint

on:
  pull_request:
    paths:
      - 'src/**'
      - 'include/**'
      - 'web/**'
      - 'index.js'
  workflow_call:

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install clang-format-18
        run: sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          clang-format-18 --dry-run --Werror \
            src/*.cpp \
            include/*.h \
            include/translations/*.h

  prettier:
    name: prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Check formatting
        run: npm run format:check
