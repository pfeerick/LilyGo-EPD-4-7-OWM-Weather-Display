name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  compile-check:
    uses: ./.github/workflows/compile-check.yml

  release:
    name: Create Release
    needs: compile-check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download firmware artifact
        uses: actions/download-artifact@v8
        with:
          name: firmware

      - name: Stage artifact (versioned release)
        if: startsWith(github.ref, 'refs/tags/')
        run: cp firmware.bin "firmware-${{ github.ref_name }}.bin"

      - name: Stage artifact (latest release)
        if: github.ref == 'refs/heads/main'
        run: cp firmware.bin firmware-latest.bin

      - name: Generate changelog (versioned)
        if: startsWith(github.ref, 'refs/tags/')
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --strip footer
          config: cliff.toml
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%d")
          {
            printf "> Release %s · %s\n\n" "${{ github.ref_name }}" "$BUILD_DATE"
            cat CHANGES.md
          } > release-notes.md
          gh release create "${{ github.ref_name }}" \
            --title "LilyGo EPD 4.7\" OWM Weather Display ${{ github.ref_name }}" \
            --notes-file release-notes.md \
            "firmware-${{ github.ref_name }}.bin"

      - name: Get previous latest SHA
        if: github.ref == 'refs/heads/main'
        id: prev-sha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(gh release view latest --json targetCommitish --jq '.targetCommitish' 2>/dev/null || echo "")
          echo "range=$( [ -n "$SHA" ] && echo "${SHA}..HEAD" || echo "" )" >> "$GITHUB_OUTPUT"

      - name: Delete existing latest release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete latest --yes --cleanup-tag || true

      - name: Generate changelog (latest)
        if: github.ref == 'refs/heads/main'
        uses: orhun/git-cliff-action@v4
        with:
          args: --strip footer ${{ steps.prev-sha.outputs.range }}
          config: cliff.toml
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create latest release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_DATE=$(date -u +"%Y-%m-%d")
          COMMIT_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          {
            printf "> Automated build from commit [\`%s\`](%s) on %s\n\n" \
              "$SHORT_SHA" "$COMMIT_URL" "$BUILD_DATE"
            cat CHANGES.md
          } > release-notes.md
          gh release create latest \
            --prerelease \
            --title "Latest Build" \
            --notes-file release-notes.md \
            --target main \
            firmware-latest.bin
