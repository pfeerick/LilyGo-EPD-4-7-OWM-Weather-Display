<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>E-ink Display Simulator</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #888;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        padding: 24px 16px;
        font-family: sans-serif;
        gap: 16px;
      }
      h1 { color: #eee; font-size: 1rem; letter-spacing: 0.05em; text-transform: uppercase; }
      #frame {
        background: #d4cfc8;
        border: 6px solid #444;
        border-radius: 4px;
        padding: 12px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      }
      canvas {
        display: block;
        image-rendering: pixelated;
      }
      #controls {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      button {
        padding: 8px 20px;
        border: none;
        border-radius: 4px;
        background: #555;
        color: #eee;
        cursor: pointer;
        font-size: 0.9rem;
      }
      button:hover { background: #666; }
      label { color: #ddd; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
      #status { color: #bbb; font-size: 0.8rem; min-width: 10ch; }
    </style>
  </head>
  <body>
    <h1>E-ink Display Simulator &mdash; 960 &times; 540</h1>
    <div id="frame">
      <canvas id="epd" width="960" height="540"></canvas>
    </div>
    <div id="controls">
      <button type="button" id="refreshBtn">Refresh</button>
      <button type="button" id="refetchBtn" title="Bust cache and re-fetch live OWM data">Re-fetch OWM</button>
      <label>
        <input type="checkbox" id="autoRefresh" />
        Auto-refresh
      </label>
      <select id="interval" style="padding:6px;border-radius:4px;background:#555;color:#eee;border:none;">
        <option value="2000">2 s</option>
        <option value="5000" selected>5 s</option>
        <option value="10000">10 s</option>
        <option value="30000">30 s</option>
      </select>
      <label>
        <input type="checkbox" id="halfScale" />
        50% scale
      </label>
      <span id="status">—</span>
    </div>
    <script>
      const EPD_W = 960;
      const EPD_H = 540;
      const canvas = document.getElementById("epd");
      const ctx = canvas.getContext("2d");
      const statusEl = document.getElementById("status");
      let autoTimer = null;

      // Pixel unpacking: 4bpp packed grayscale.
      //   odd x  → upper nibble: (byte >> 4) & 0xF
      //   even x → lower nibble: byte & 0xF
      // 0x0 = black, 0xF = white
      function renderFramebuffer(fb) {
        const imgData = ctx.createImageData(EPD_W, EPD_H);
        const d = imgData.data;
        const u8 = new Uint8Array(fb);
        for (let y = 0; y < EPD_H; y++) {
          const rowBase = y * (EPD_W / 2);
          for (let x = 0; x < EPD_W; x++) {
            const byteIdx = rowBase + Math.floor(x / 2);
            const nibble = (x % 2 === 1)
              ? (u8[byteIdx] >> 4) & 0xf   // odd x → upper nibble
              : u8[byteIdx] & 0xf;          // even x → lower nibble
            const gray = Math.round((nibble / 15) * 255);
            const px = (y * EPD_W + x) * 4;
            d[px]     = gray;
            d[px + 1] = gray;
            d[px + 2] = gray;
            d[px + 3] = 255;
          }
        }
        ctx.putImageData(imgData, 0, 0);
      }

      async function fetchAndRender(bustCache = false) {
        statusEl.textContent = bustCache ? "Re-fetching OWM…" : "Loading…";
        try {
          if (bustCache) await fetch("/framebuffer/refresh", { method: "POST" });
          const t0 = performance.now();
          const res = await fetch("/framebuffer", { cache: "no-store" });
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            statusEl.textContent = `Error: ${body.error ?? res.status}`;
            if (body.detail) console.error(body.detail);
            return;
          }
          const buf = await res.arrayBuffer();
          if (buf.byteLength !== (EPD_W / 2) * EPD_H) {
            statusEl.textContent = `Bad size: ${buf.byteLength} (simulator not built?)`;
            return;
          }
          renderFramebuffer(buf);
          const ms = Math.round(performance.now() - t0);
          statusEl.textContent = `${new Date().toLocaleTimeString()} (${ms} ms)`;
        } catch (e) {
          statusEl.textContent = `Error: ${e.message}`;
        }
      }

      function startAuto() {
        stopAuto();
        autoTimer = setInterval(fetchAndRender, parseInt(document.getElementById("interval").value, 10));
      }
      function stopAuto() {
        if (autoTimer !== null) { clearInterval(autoTimer); autoTimer = null; }
      }

      document.getElementById("refreshBtn").addEventListener("click", () => fetchAndRender(false));
      document.getElementById("refetchBtn").addEventListener("click", () => fetchAndRender(true));

      document.getElementById("autoRefresh").addEventListener("change", (e) => {
        e.target.checked ? startAuto() : stopAuto();
      });

      document.getElementById("interval").addEventListener("change", () => {
        if (document.getElementById("autoRefresh").checked) startAuto();
      });

      document.getElementById("halfScale").addEventListener("change", (e) => {
        if (e.target.checked) {
          canvas.style.width  = `${EPD_W / 2}px`;
          canvas.style.height = `${EPD_H / 2}px`;
        } else {
          canvas.style.width  = "";
          canvas.style.height = "";
        }
      });

      // Load on page open
      fetchAndRender();
    </script>
  </body>
</html>
