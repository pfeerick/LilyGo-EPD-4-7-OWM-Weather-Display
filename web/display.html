<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>E-ink Display Simulator</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #888;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        padding: 24px 16px;
        padding-top: 52px;
        font-family: sans-serif;
        gap: 16px;
      }
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: #1e1e2e;
        display: flex;
        z-index: 100;
      }
      nav a {
        flex: 1;
        text-align: center;
        padding: 12px;
        color: #aaa;
        text-decoration: none;
        font-size: 0.9em;
        border-bottom: 3px solid transparent;
      }
      nav a.active {
        color: #fff;
        border-bottom-color: #2a7ae2;
      }
      nav a:hover:not(.active) {
        color: #ddd;
        background: #2a2a3e;
      }
      h1 { color: #eee; font-size: 1rem; letter-spacing: 0.05em; text-transform: uppercase; }
      #frame {
        position: relative;
        background: #d4cfc8;
        border: 6px solid #444;
        border-radius: 4px;
        padding: 12px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      }
      canvas {
        display: block;
        image-rendering: pixelated;
      }
      #stoppedOverlay {
        position: absolute;
        top: 12px;
        left: 12px;
        right: 12px;
        bottom: 12px;
        background: rgba(0,0,0,0.55);
        color: #eee;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        pointer-events: none;
      }
      #controls {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      button, select {
        padding: 8px 20px;
        border: none;
        border-radius: 4px;
        background: #555;
        color: #eee;
        cursor: pointer;
        font-size: 0.9rem;
      }
      button:hover:not(:disabled) { background: #666; }
      button:disabled { opacity: 0.5; cursor: default; }
      label { color: #ddd; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
      #status { color: #bbb; font-size: 0.8rem; text-align: center; min-height: 1.2em; }
      #logPanel {
        width: 100%;
        max-width: 960px;
        background: #1e1e2e;
        border-radius: 4px;
        color: #ccc;
      }
      #logPanel summary {
        padding: 8px 12px;
        cursor: pointer;
        font-size: 0.85rem;
        color: #ddd;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      #logToolbar { padding: 0 12px 8px; display: flex; justify-content: flex-end; }
      #logOutput {
        margin: 0;
        padding: 8px 12px;
        max-height: 180px;
        overflow-y: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.75rem;
        line-height: 1.4;
        white-space: pre-wrap;
        word-break: break-all;
        background: #14141f;
        border-top: 1px solid #333;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/">Configuration</a>
      <a href="/update">Firmware Update</a>
      <a href="/display" class="active">Display</a>
    </nav>
    <h1>E-ink Display Simulator &mdash; 960 &times; 540</h1>
    <div id="frame">
      <canvas id="epd" width="960" height="540"></canvas>
      <div id="stoppedOverlay">Stopped</div>
    </div>
    <div id="controls">
      <select id="screenSelect">
        <option value="weather">Weather Display</option>
        <option value="setup">Setup Screen</option>
      </select>
      <button type="button" id="startBtn">Start</button>
      <button type="button" id="stopBtn" disabled>Stop</button>
      <button type="button" id="refreshBtn" disabled>Refresh</button>
      <button type="button" id="refetchBtn" title="Re-fetch live OWM data" disabled>Re-fetch OWM</button>
      <button type="button" id="saveBtn" title="Save the current display as a PNG">Save PNG</button>
      <select id="interval">
        <option value="2000">2 s</option>
        <option value="5000" selected>5 s</option>
        <option value="10000">10 s</option>
        <option value="30000">30 s</option>
      </select>
      <label>
        <input type="checkbox" id="halfScale" />
        50% scale
      </label>
      <label>
        <input type="checkbox" id="showCity" />
        Show city
      </label>
    </div>
    <span id="status">Stopped</span>
    <details id="logPanel">
      <summary>Serial Output</summary>
      <div id="logToolbar">
        <button type="button" id="clearLogBtn">Clear</button>
      </div>
      <pre id="logOutput"></pre>
    </details>
    <script>
      const EPD_W = 960;
      const EPD_H = 540;
      const canvas = document.getElementById("epd");
      const ctx = canvas.getContext("2d");
      const statusEl = document.getElementById("status");
      const stoppedOverlay = document.getElementById("stoppedOverlay");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const refreshBtn = document.getElementById("refreshBtn");
      const refetchBtn = document.getElementById("refetchBtn");
      const screenSelect = document.getElementById("screenSelect");
      let autoTimer = null;
      let running = false;
      let wasmModule = null;
      let wasmReady = false;
      let owmCfg = { city: "", units: "M", lang: "EN", latitude: 0, gmtOffsetSec: 0, dstOffsetSec: 0 };

      const logOutput = document.getElementById("logOutput");
      const MAX_LOG_LINES = 1000;

      function appendLogLine(text) {
        const atBottom = logOutput.scrollTop + logOutput.clientHeight >= logOutput.scrollHeight - 4;
        const ts = new Date().toLocaleTimeString();
        for (const line of text.split("\n")) {
          logOutput.appendChild(document.createTextNode(`[${ts}] ${line}\n`));
        }
        while (logOutput.childNodes.length > MAX_LOG_LINES) {
          logOutput.removeChild(logOutput.firstChild);
        }
        if (atBottom) logOutput.scrollTop = logOutput.scrollHeight;
      }

      document.getElementById("clearLogBtn").addEventListener("click", () => {
        logOutput.textContent = "";
      });

      // Pixel unpacking: 4bpp packed grayscale.
      //   odd x  → upper nibble: (byte >> 4) & 0xF
      //   even x → lower nibble: byte & 0xF
      // 0x0 = black, 0xF = white
      function renderFramebuffer(fb) {
        const imgData = ctx.createImageData(EPD_W, EPD_H);
        const d = imgData.data;
        const u8 = new Uint8Array(fb.buffer ?? fb);
        for (let y = 0; y < EPD_H; y++) {
          const rowBase = y * (EPD_W / 2);
          for (let x = 0; x < EPD_W; x++) {
            const byteIdx = rowBase + Math.floor(x / 2);
            const nibble = (x % 2 === 1)
              ? (u8[byteIdx] >> 4) & 0xf   // odd x → upper nibble
              : u8[byteIdx] & 0xf;          // even x → lower nibble
            const gray = Math.round((nibble / 15) * 255);
            const px = (y * EPD_W + x) * 4;
            d[px]     = gray;
            d[px + 1] = gray;
            d[px + 2] = gray;
            d[px + 3] = 255;
          }
        }
        ctx.putImageData(imgData, 0, 0);
      }

      function applyCity() {
        const revealed = document.getElementById("showCity").checked;
        const city = revealed ? owmCfg.city : "Simulator";
        wasmModule.ccall("wasm_set_config", null,
          ["string", "string", "string", "number", "number", "number"],
          [city, owmCfg.units, owmCfg.lang, owmCfg.latitude, owmCfg.gmtOffsetSec, owmCfg.dstOffsetSec]);
      }

      async function ensureWasm() {
        if (wasmReady) return true;
        statusEl.textContent = "Loading WASM…";
        try {
          await new Promise((resolve, reject) => {
            const s = document.createElement("script");
            s.src = "/wasm/simulator.js";
            s.onload = resolve;
            s.onerror = () => reject(new Error("Failed to load /wasm/simulator.js — build the WASM module first"));
            document.head.appendChild(s);
          });
          wasmModule = await SimulatorModule({
            locateFile: f => `/wasm/${f}`,
            print: appendLogLine,
            printErr: appendLogLine,
          });
          wasmModule.ccall("wasm_init", null, [], []);
          owmCfg = await (await fetch("/owm-config")).json();
          applyCity();
          wasmReady = true;
          return true;
        } catch (e) {
          statusEl.textContent = `WASM load failed: ${e.message}`;
          return false;
        }
      }

      async function fetchAndRender(refetch = false) {
        statusEl.textContent = refetch ? "Re-fetching OWM…" : "Rendering…";
        try {
          if (!await ensureWasm()) return;
          const t0 = performance.now();
          const owmRes = await fetch(`/owm${refetch ? `?t=${Date.now()}` : ""}`, { cache: "no-store" });
          if (!owmRes.ok) {
            statusEl.textContent = `OWM error: ${owmRes.status}`;
            return;
          }
          const json = await owmRes.text();
          const enc = new TextEncoder().encode(json);
          const ptr = wasmModule._malloc(enc.length);
          // Re-read HEAPU8 after every WASM call that can grow memory.
          // Emscripten's HEAPU8 view is detached when the underlying ArrayBuffer is replaced.
          wasmModule.HEAPU8.set(enc, ptr);
          const ok = wasmModule.ccall("wasm_render", "number", ["number", "number"], [ptr, enc.length]);
          wasmModule._free(ptr);
          if (ok !== 0) { statusEl.textContent = "Render failed"; return; }
          const fbPtr  = wasmModule.ccall("wasm_get_framebuffer", "number", [], []);
          const fbSize = wasmModule.ccall("wasm_fb_size",         "number", [], []);
          // Copy out immediately so we don't hold a view that could become detached.
          const fbCopy = new Uint8Array(wasmModule.HEAPU8.buffer, fbPtr, fbSize).slice();
          renderFramebuffer(fbCopy);
          const ms = Math.round(performance.now() - t0);
          statusEl.textContent = `${new Date().toLocaleTimeString()} (${ms} ms)`;
        } catch (e) {
          statusEl.textContent = `Error: ${e.message}`;
        }
      }

      async function renderSetupScreen() {
        statusEl.textContent = "Rendering setup screen…";
        try {
          if (!await ensureWasm()) return;
          const t0 = performance.now();
          wasmModule.ccall("wasm_render_setup", null, ["string"], ["WeatherSetup-A1B2"]);
          const fbPtr  = wasmModule.ccall("wasm_get_framebuffer", "number", [], []);
          const fbSize = wasmModule.ccall("wasm_fb_size",         "number", [], []);
          const fbCopy = new Uint8Array(wasmModule.HEAPU8.buffer, fbPtr, fbSize).slice();
          renderFramebuffer(fbCopy);
          const ms = Math.round(performance.now() - t0);
          statusEl.textContent = `${new Date().toLocaleTimeString()} (${ms} ms)`;
        } catch (e) {
          statusEl.textContent = `Error: ${e.message}`;
        }
      }

      function renderActiveScreen(refetch = false) {
        return screenSelect.value === "setup" ? renderSetupScreen() : fetchAndRender(refetch);
      }

      function updateRefetchState() {
        refetchBtn.disabled = !running || screenSelect.value === "setup";
      }

      async function startSimulator() {
        startBtn.disabled = true;
        statusEl.textContent = "Starting…";
        if (!await ensureWasm()) { startBtn.disabled = false; return; }
        wasmModule.ccall("wasm_init", null, [], []);
        applyCity();
        running = true;
        stoppedOverlay.style.display = "none";
        stopBtn.disabled = false;
        refreshBtn.disabled = false;
        updateRefetchState();
        await renderActiveScreen(false);
        autoTimer = setInterval(() => renderActiveScreen(false), parseInt(document.getElementById("interval").value, 10));
      }

      function stopSimulator() {
        if (autoTimer !== null) { clearInterval(autoTimer); autoTimer = null; }
        running = false;
        stoppedOverlay.style.display = "";
        startBtn.disabled = false;
        stopBtn.disabled = true;
        refreshBtn.disabled = true;
        refetchBtn.disabled = true;
        statusEl.textContent = "Stopped";
      }

      startBtn.addEventListener("click", () => startSimulator());
      stopBtn.addEventListener("click", () => stopSimulator());
      refreshBtn.addEventListener("click", () => renderActiveScreen(false));
      refetchBtn.addEventListener("click", () => renderActiveScreen(true));

      screenSelect.addEventListener("change", () => {
        updateRefetchState();
        if (running) renderActiveScreen(false);
      });

      document.getElementById("interval").addEventListener("change", () => {
        if (running) {
          clearInterval(autoTimer);
          autoTimer = setInterval(() => renderActiveScreen(false), parseInt(document.getElementById("interval").value, 10));
        }
      });

      document.getElementById("saveBtn").addEventListener("click", () => {
        canvas.toBlob((blob) => {
          if (!blob) { statusEl.textContent = "PNG export failed"; return; }
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          const ts = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
          a.href = url;
          a.download = `epd-${ts}.png`;
          a.click();
          URL.revokeObjectURL(url);
        }, "image/png");
      });

      document.getElementById("showCity").addEventListener("change", async () => {
        if (!await ensureWasm()) return;
        applyCity();
        if (running) renderActiveScreen(false);
      });

      document.getElementById("halfScale").addEventListener("change", (e) => {
        if (e.target.checked) {
          canvas.style.width  = `${EPD_W / 2}px`;
          canvas.style.height = `${EPD_H / 2}px`;
        } else {
          canvas.style.width  = "";
          canvas.style.height = "";
        }
      });
    </script>
  </body>
</html>
